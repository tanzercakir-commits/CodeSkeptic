name: WSL smoke

# ROUND 2 — pure diagnostics (the Vampire/setup-wsl@v5 attempt failed
# with no logs readable from the sandbox). This round probes what the
# hosted windows-latest runner can actually do WSL-wise, publishes
# everything to refs/ci-logs, and always reports success so the
# probe's verdict is read from the logs, not guessed from redness.
# The real smoke gets designed on these facts.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  push:
    branches: ["phase*"]
    paths: [".github/workflows/wsl-smoke.yml"]

permissions:
  contents: write

concurrency:
  group: wsl-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Probe WSL capabilities
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = "Continue"
          "=== wsl --version ===" | Out-File -Append probe.txt
          wsl.exe --version 2>&1 | Out-File -Append probe.txt
          "=== wsl --status ===" | Out-File -Append probe.txt
          wsl.exe --status 2>&1 | Out-File -Append probe.txt
          "=== systeminfo hyper-v ===" | Out-File -Append probe.txt
          (systeminfo | Select-String -Pattern "Hyper-V") 2>&1 | Out-File -Append probe.txt
          "=== try: wsl --install Ubuntu-24.04 --no-launch ===" | Out-File -Append probe.txt
          wsl.exe --install Ubuntu-24.04 --no-launch 2>&1 | Out-File -Append probe.txt
          "install exit: $LASTEXITCODE" | Out-File -Append probe.txt
          "=== wsl --list --verbose (post-install) ===" | Out-File -Append probe.txt
          wsl.exe --list --verbose 2>&1 | Out-File -Append probe.txt
          "=== try: run uname in default distro ===" | Out-File -Append probe.txt
          wsl.exe -- uname -a 2>&1 | Out-File -Append probe.txt
          "uname exit: $LASTEXITCODE" | Out-File -Append probe.txt
          "=== try: set-default-version 2 ===" | Out-File -Append probe.txt
          wsl.exe --set-default-version 2 2>&1 | Out-File -Append probe.txt
          Get-Content probe.txt

      - name: Publish probe to refs/ci-logs/*
        if: always()
        shell: bash
        run: |
          iconv -f UTF-16LE -t UTF-8 probe.txt > probe.utf8.txt 2>/dev/null || cp probe.txt probe.utf8.txt
          git config user.name "ci-logs"
          git config user.email "ci-logs@localhost"
          git checkout --detach -q
          git add -f probe.utf8.txt
          git commit -qm "wsl probe @ ${{ github.sha }}" || true
          git push --force origin "HEAD:refs/ci-logs/${{ github.sha }}/wsl-smoke"

      - name: Mirror job status to refs/status/*
        if: always()
        shell: bash
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/wsl-smoke/${{ job.status }}"
