name: Juliet benchmark

# Juliet skor bekcisi: analiz koduna dokunan HER PR'da kosar
# (suit cache'te, ~3.5 dk) ve juliet_expected.txt tabanlarinin altina
# dusus job'i kirmizi yapar (JULIET_GUARD_FAIL). Docs-only PR'lar paths
# filtresiyle muaf. Sonuclar JULIET_RESULT satirlarindan izlenir.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "CWE basina dosya limiti (0 = limitsiz)"
        default: "400"
  schedule:
    - cron: "0 5 * * 1"  # pazartesi 05:00 UTC
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/juliet.yml"
      - "scripts/run_juliet.sh"
      - "scripts/juliet_eval.py"
      - "scripts/juliet_expected.txt"
      - "src/**"
      - "tests/**"
      - "CMakeLists.txt"

# Maliyet dengesi: ayni ref'e ust uste push eski kosumu iptal eder
concurrency:
  group: juliet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  juliet:
    # Draft'ta kosma: PR basina bekci bir kez, ready aninda calisir
    # (build-and-test her push'ta kaliyor — hizli cekirdek sinyal).
    if: github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libclang-18-dev libzstd-dev zlib1g-dev \
            clang-18 ninja-build unzip

      - name: Configure and build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-18
          cmake --build build

      - name: Cache Juliet suite
        uses: actions/cache@v4
        with:
          path: juliet-work/juliet
          key: juliet-c-cpp-1.3

      - name: Run benchmark
        # shell: bash → -eo pipefail: tee borusu exit kodunu maskeleyemez
        # Limit: PR bekcisi 400 (hizli sinyal); haftalik cron 1600 (derin
        # ornekleme — 61-ailesi gibi seyrek akis varyantlari PR orneklemine
        # girmiyor, trend olcumu onlari da gorsun)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LIMIT=1600
          else
            LIMIT="${{ github.event.inputs.limit || '400' }}"
          fi
          bash scripts/run_juliet.sh ./build/src/zerodefect juliet-work \
            "$LIMIT" | tee juliet-output.txt

      - name: Summary
        if: always()
        run: |
          {
            echo "## Juliet sonuçları"
            echo '```'
            grep "JULIET_RESULT" juliet-output.txt || echo "(sonuç yok)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
