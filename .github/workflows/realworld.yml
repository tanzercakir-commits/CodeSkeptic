name: Real-world scan

# On-demand re-validation of the README's real-world scan table on the
# current engine. Triggered by pushing to the `realworld-scan` branch
# (the dev sandbox cannot use workflow_dispatch — git protocol only).
# Each project is built with its own build system at a PINNED version,
# analyzed from its real compilation database with its idiom profile,
# and the resulting counts + reports are published to
# refs/ci-logs/<sha>/realworld for git-protocol readback.
#
# Scope: the projects whose builds fit a CI runner (libgit2,
# rtp2httpd). The heavyweights (systemd, shadPS4, llama.cpp) stay
# documented as hand-run campaigns.
on:
  push:
    branches: ["realworld-scan"]

permissions:
  contents: write

concurrency:
  group: realworld-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.head_commit.message, '[inspect-only]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev libclang-20-dev clang-20 \
            libzstd-dev zlib1g-dev ninja-build libssl-dev

      - name: Build CodeSkeptic
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-20 \
            -DCODESKEPTIC_BUILD_TESTS=OFF
          cmake --build build

      - name: Scan libgit2 (pinned v1.9.0, idiom profile)
        run: |
          set -o pipefail
          curl -sL --retry 3 \
            https://github.com/libgit2/libgit2/archive/refs/tags/v1.9.0.tar.gz \
            | tar xz
          cd libgit2-1.9.0
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=OFF -DBUILD_CLI=OFF >/dev/null
          cd ..
          code=0
          ./build/src/codeskeptic libgit2-1.9.0/src \
            --build-path libgit2-1.9.0/build \
            --alloc-functions git__malloc,git__calloc,git__realloc,git__strdup \
            --free-functions git__free \
            --report-paths "$PWD/libgit2-1.9.0/src" \
            > libgit2-scan.log 2>&1 || code=$?
          tail -40 libgit2-scan.log
          # Same counting regex as run_corpus.sh, for comparability.
          grep -E '^\S+:[0-9]+:[0-9]+ \[(warning|error)\]' libgit2-scan.log \
            > libgit2-findings.txt || true
          n=$(wc -l < libgit2-findings.txt)
          files=$(find libgit2-1.9.0/src -name '*.c' | wc -l)
          ninfo=$(grep -cE '^\S+:[0-9]+:[0-9]+ \[info\]' libgit2-scan.log || true)
          echo "REALWORLD_RESULT project=libgit2 v=1.9.0 c_files=$files findings=$n info=$ninfo exit=$code"
          echo "REALWORLD_RESULT project=libgit2 v=1.9.0 c_files=$files findings=$n info=$ninfo exit=$code" >> results.txt

      - name: Scan rtp2httpd (pinned, no profile needed)
        run: |
          set -o pipefail
          git clone --quiet --depth 1 https://github.com/stackia/rtp2httpd
          cd rtp2httpd
          # autotools project; a bear-style DB via compile flags is
          # overkill — the fallback per-extension DB parses plain C99.
          cd ..
          code=0
          ./build/src/codeskeptic rtp2httpd/src \
            --report-paths "$PWD/rtp2httpd/src" \
            > rtp2httpd-scan.log 2>&1 || code=$?
          tail -40 rtp2httpd-scan.log
          grep -E '^\S+:[0-9]+:[0-9]+ \[(warning|error)\]' rtp2httpd-scan.log \
            > rtp2httpd-findings.txt || true
          n=$(wc -l < rtp2httpd-findings.txt)
          files=$(find rtp2httpd/src -name '*.c' | wc -l)
          ninfo=$(grep -cE '^\S+:[0-9]+:[0-9]+ \[info\]' rtp2httpd-scan.log || true)
          echo "REALWORLD_RESULT project=rtp2httpd c_files=$files findings=$n info=$ninfo exit=$code"
          echo "REALWORLD_RESULT project=rtp2httpd c_files=$files findings=$n info=$ninfo exit=$code" >> results.txt

      - name: Deep corpus (abseil) for good measure
        run: |
          CORPUS_DEEP=1 bash scripts/run_corpus.sh ./build/src/codeskeptic corpus-work \
            2>&1 | tail -20 | tee -a results.txt

      - name: Publish results + logs to refs/ci-logs/*
        if: always()
        run: |
          tail -c 80000 libgit2-scan.log > libgit2.tail.log 2>/dev/null || true
          tail -c 30000 rtp2httpd-scan.log > rtp2httpd.tail.log 2>/dev/null || true
          git config user.name "ci-logs"
          git config user.email "ci-logs@localhost"
          git checkout --detach -q
          for f in results.txt libgit2-findings.txt rtp2httpd-findings.txt \
                   libgit2.tail.log rtp2httpd.tail.log; do
            [ -f "$f" ] && git add -f "$f" || true
          done
          git commit -qm "realworld scan @ ${{ github.sha }}" || true
          git push --force origin "HEAD:refs/ci-logs/${{ github.sha }}/realworld"

      - name: Mirror job status to refs/status/*
        if: always()
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/realworld/${{ job.status }}"

  # Fast source-fetch lane for finding adjudication: the dev sandbox's
  # proxy only allows THIS repo's git protocol, so CI fetches the
  # third-party sources the triage needs and publishes them to a
  # git-readable ref. Runs only on [inspect-only] pushes (the scan job
  # is skipped then).
  inspect:
    runs-on: ubuntu-24.04
    if: ${{ contains(github.event.head_commit.message, '[inspect-only]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch adjudication sources
        run: |
          set +e
          curl -sL --retry 3 \
            https://github.com/libgit2/libgit2/archive/refs/tags/v1.9.0.tar.gz \
            | tar xz
          git clone --quiet --depth 1 https://github.com/stackia/rtp2httpd
          mkdir -p inspect
          { echo "HEAD $(git -C rtp2httpd rev-parse HEAD)"; \
            git -C rtp2httpd log -1 --format='date %cI'; } > inspect/rtp2httpd-head.txt
          # Discover the hashmap implementation files (name drifted).
          find libgit2-1.9.0/src -name '*hash*' > inspect/lg2-hash-files.txt
          for f in $(cat inspect/lg2-hash-files.txt); do
            cp "$f" "inspect/lg2-$(basename "$f")"
          done
          cp libgit2-1.9.0/src/libgit2/commit.c      inspect/lg2-commit.c
          cp libgit2-1.9.0/src/libgit2/pathspec.c    inspect/lg2-pathspec.c
          cp rtp2httpd/src/timezone.c                inspect/rtp-timezone.c
          cp rtp2httpd/src/service.c                 inspect/rtp-service.c
          cp rtp2httpd/src/http_chunked_decoder.c    inspect/rtp-http_chunked_decoder.c
          cp rtp2httpd/src/http_proxy_rewrite.c      inspect/rtp-http_proxy_rewrite.c
          tar czf inspect/rtp2httpd-full.tgz rtp2httpd/
          wc -l inspect/* || true
          exit 0
      - name: Publish to refs/ci-logs/*
        if: always()
        run: |
          git config user.name "ci-logs"
          git config user.email "ci-logs@localhost"
          git checkout --detach -q
          git add -f inspect/
          git commit -qm "inspect sources @ ${{ github.sha }}" || true
          git push --force origin "HEAD:refs/ci-logs/${{ github.sha }}/inspect"
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/inspect/${{ job.status }}"
