# libgit2 idiom profile — as used in the real-world scan (149 -> 44,
# 11 confirmed OOM-path leaks). libgit2 routes all allocation through
# its git__ wrappers; without these the leak/double-free/UAF dataflow
# never sees an allocation.
alloc_functions = git__malloc,git__calloc,git__realloc,git__strdup
free_functions = git__free
