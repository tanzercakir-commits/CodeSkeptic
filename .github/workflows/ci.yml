name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cost balance: back-to-back pushes to the same ref cancel the old run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libclang-18-dev libzstd-dev zlib1g-dev \
            clang-18 ninja-build

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=/usr/lib/llvm-18

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Test (single process)
        # ctest runs each test in its own process — it cannot see
        # global-state leakage between tests (this is how McpServerTest's
        # filter leak hid 11 interproc tests). The same binary is also
        # run in a single process so contamination becomes visible.
        run: ./build/tests/zerodefect_tests

      - name: Smoke test
        run: |
          cat > /tmp/smoke.cpp << 'EOF'
          void leak() {
              int* p = new int(42);
              p = new int(7);
          }
          EOF
          # Exit code must be 1 when there are findings. Actions steps run
          # with `bash -e`: a failing command not caught with || kills the
          # script immediately.
          code=0
          ./build/src/zerodefect /tmp/smoke.cpp || code=$?
          test "$code" -eq 1

      - name: Self-scan (dogfood gate)
        # The analyzer analyzes its own sources — with the founding
        # policy active. Any finding (or a hard-coded absolute path)
        # fails CI: exit 0 means clean.
        run: ./build/src/zerodefect src/ --build-path build --policy no-absolute-paths

      - name: Real-world corpus (cJSON + tinyxml2)
        run: bash scripts/run_corpus.sh ./build/src/zerodefect /tmp/corpus
