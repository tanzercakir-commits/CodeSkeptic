name: Release

# Tag push v* -> build, package (scripts/package_release.sh), smoke the
# tarball in CLEAN containers (the release-blocking gate: extract ->
# analyze docs/demo.c -> exactly exit 1 with findings), upload assets to
# a DRAFT release, and publish only when every leg is green. A release
# that never ran on a clean machine never goes public.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04   # older glibc -> wider binary compatibility
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 (apt.llvm.org — jammy has no in-archive LLVM 20)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt-llvm-org.asc >/dev/null
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev libclang-20-dev clang-20 \
            libzstd-dev zlib1g-dev ninja-build

      - name: Build (portable link flags)
        run: |
          set -o pipefail
          { cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH=/usr/lib/llvm-20 \
              -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" \
            && cmake --build build ; } 2>&1 | tee /tmp/build.log

      - name: Test
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure 2>&1 | tee /tmp/ctest.log

      - name: Version must match the tag
        run: |
          v=$(./build/src/codeskeptic --version)
          echo "binary: $v  tag: ${GITHUB_REF_NAME}"
          test "CodeSkeptic ${GITHUB_REF_NAME#v}" = "$v"

      - name: Package
        run: |
          set -o pipefail
          bash scripts/package_release.sh build/src/codeskeptic dist clang-20 \
            2>&1 | tee /tmp/package.log

      - name: Smoke in clean containers (22.04 + 24.04)
        # The tarball must work on a machine with NO LLVM installed.
        # libc6-dev is installed because analyzing C code needs the
        # target's own libc headers — same requirement as any compiler.
        run: |
          for img in ubuntu:22.04 ubuntu:24.04; do
            echo "=== smoke on $img ==="
            docker run --rm -v "$PWD/dist:/dist:ro" -v "$PWD/docs:/demo:ro" "$img" bash -c '
              set -ex
              # ONLY libc6-dev (demo.c needs libc headers). The runtime
              # libraries (zstd/zlib/tinfo/LLVM/...) must come from the
              # package itself — installing them here MASKED a missing
              # bundle for three releases (critique-2 finding).
              apt-get update -qq >/dev/null && apt-get install -y -qq libc6-dev >/dev/null
              tar xzf /dist/codeskeptic-*-linux-*.tar.gz -C /tmp
              cd /tmp/codeskeptic-*
              # Self-contained proof: no unresolved libraries, and the
              # bundled ones resolve from the PACKAGE lib dir, not the host.
              ldd ./bin/codeskeptic | tee /tmp/ldd.txt
              ! grep -q "not found" /tmp/ldd.txt
              # ldd prints the rpath literally (.../pkg/./bin/../lib/...),
              # so assert the resolution PREFIX is the extracted package,
              # not an exact directory shape (first hardened run lesson:
              # the bundle was fine, the regex was not).
              for so in "libLLVM\.so" "libzstd\.so" "libz\.so" "libtinfo\.so"; do
                grep -E "$so" /tmp/ldd.txt | grep -qE "=> /tmp/codeskeptic-" || {
                  echo "SELF-CONTAINED VIOLATION: $so resolves off-package"; exit 1; }
              done
              code=0; out=$(./bin/codeskeptic /demo/demo.c 2>&1) || code=$?
              echo "$out"
              test "$code" -eq 1
              echo "$out" | grep -qi finding' 2>&1 | tee -a /tmp/smoke.log
          done

      - name: Upload to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft \
            --title "CodeSkeptic $GITHUB_REF_NAME" \
            --notes "Draft — assets uploading." 2>/dev/null || true
          cp dist/codeskeptic-*-linux-*.tar.gz codeskeptic-linux-x86_64.tar.gz
          gh release upload "$GITHUB_REF_NAME" \
            dist/codeskeptic-*-linux-*.tar.gz \
            codeskeptic-linux-x86_64.tar.gz --clobber

      - name: Diagnostics -> refs/ci-logs/*
        if: always()
        run: |
          for f in build ctest package smoke; do
            tail -c 25000 "/tmp/$f.log" > "$f.tail.log" 2>/dev/null || true
          done
          git config user.name "ci-logs"
          git config user.email "ci-logs@localhost"
          git checkout --detach -q
          git add -f build.tail.log ctest.tail.log package.tail.log smoke.tail.log 2>/dev/null || true
          git commit -qm "release-linux logs @ ${{ github.sha }}" || true
          git push --force origin "HEAD:refs/ci-logs/${{ github.sha }}/release-linux"

      - name: Mirror job status to refs/status/*
        if: always()
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/release-linux/${{ job.status }}"

  macos:
    runs-on: macos-14   # arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 (Homebrew, PINNED — brew's default llvm
              drifts to new majors; the engine is tested on 18/20)
        run: brew install llvm@20 cmake ninja

      - name: Build
        run: |
          set -o pipefail
          { cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$(brew --prefix llvm@20)" \
            && cmake --build build ; } 2>&1 | tee /tmp/build.log

      - name: Test
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure 2>&1 | tee /tmp/ctest.log

      - name: Version must match the tag
        run: |
          v=$(./build/src/codeskeptic --version)
          echo "binary: $v  tag: ${GITHUB_REF_NAME}"
          test "CodeSkeptic ${GITHUB_REF_NAME#v}" = "$v"

      - name: Package
        run: |
          set -o pipefail
          bash scripts/package_release.sh build/src/codeskeptic dist \
            "$(brew --prefix llvm@20)/bin/clang" 2>&1 | tee /tmp/package.log

      - name: Smoke from an unpacked tree outside the repo
        # Relocation check: run from /tmp; the exe-relative bundled
        # headers outrank the baked brew path by resolution order.
        run: |
          tar xzf dist/codeskeptic-*-darwin-*.tar.gz -C /tmp
          cd /tmp/codeskeptic-*
          code=0; out=$(./bin/codeskeptic "$GITHUB_WORKSPACE/docs/demo.c" 2>&1) || code=$?
          echo "$out" | tee /tmp/smoke.log
          echo "exit_code=$code" >> /tmp/smoke.log
          test "$code" -eq 1
          echo "$out" | grep -qi finding

      - name: Upload to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft \
            --title "CodeSkeptic $GITHUB_REF_NAME" \
            --notes "Draft — assets uploading." 2>/dev/null || true
          cp dist/codeskeptic-*-darwin-*.tar.gz codeskeptic-darwin-arm64.tar.gz
          gh release upload "$GITHUB_REF_NAME" \
            dist/codeskeptic-*-darwin-*.tar.gz \
            codeskeptic-darwin-arm64.tar.gz --clobber

      - name: Diagnostics -> refs/ci-logs/*
        if: always()
        run: |
          for f in build ctest package smoke; do
            tail -c 25000 "/tmp/$f.log" > "$f.tail.log" 2>/dev/null || true
          done
          git config user.name "ci-logs"
          git config user.email "ci-logs@localhost"
          git checkout --detach -q
          git add -f build.tail.log ctest.tail.log package.tail.log smoke.tail.log 2>/dev/null || true
          git commit -qm "release-macos logs @ ${{ github.sha }}" || true
          git push --force origin "HEAD:refs/ci-logs/${{ github.sha }}/release-macos"

      - name: Mirror job status to refs/status/*
        if: always()
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/release-macos/${{ job.status }}"

  publish:
    needs: [linux, macos]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Combined checksums, then publish the draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" -p '*.tar.gz' -D assets
          (cd assets && sha256sum *.tar.gz) > sha256sums.txt
          cat sha256sums.txt
          gh release upload "$GITHUB_REF_NAME" sha256sums.txt --clobber
          gh release edit "$GITHUB_REF_NAME" \
            --title "CodeSkeptic $GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md --draft=false
      - name: Mirror job status to refs/status/*
        if: always()
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/release-publish/${{ job.status }}"
