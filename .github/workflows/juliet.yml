name: Juliet benchmark

# Juliet score guard: runs on EVERY PR that touches analysis code
# (suite is cached, ~3.5 min) and dropping below the juliet_expected.txt
# baselines turns the job red (JULIET_GUARD_FAIL). Docs-only PRs are
# exempt via the paths filter. Results are tracked via JULIET_RESULT
# lines.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "File limit per CWE (0 = unlimited)"
        default: "400"
  schedule:
    - cron: "0 5 * * 1"  # Monday 05:00 UTC
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/juliet.yml"
      - "scripts/run_juliet.sh"
      - "scripts/juliet_eval.py"
      - "scripts/juliet_expected.txt"
      - "src/**"
      - "tests/**"
      - "CMakeLists.txt"

# Cost balance: back-to-back pushes to the same ref cancel the old run
concurrency:
  group: juliet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  juliet:
    # Don't run on drafts: the guard runs once per PR, at ready time
    # (build-and-test stays on every push — fast core signal).
    if: github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-20-dev libclang-20-dev libzstd-dev zlib1g-dev \
            clang-20 ninja-build unzip

      - name: Configure and build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-20
          cmake --build build

      - name: Cache Juliet suite
        uses: actions/cache@v4
        with:
          path: juliet-work/juliet
          key: juliet-c-cpp-1.3

      - name: Run benchmark
        # shell: bash → -eo pipefail: the tee pipe cannot mask the exit code
        # Limit: PR guard 400 (fast signal); weekly cron 1600 (deep
        # sampling — sparse flow variants like the 61-family don't make it
        # into the PR sample, the trend measurement should see them too)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LIMIT=1600
          else
            LIMIT="${{ github.event.inputs.limit || '400' }}"
          fi
          bash scripts/run_juliet.sh ./build/src/codeskeptic juliet-work \
            "$LIMIT" | tee juliet-output.txt

      - name: Deep corpus (abseil) — weekly only
        # Real modern C++ FP net (CORPUS_DEEP gates the ~2.5 min abseil
        # leg out of PR runs — CI cost balance). Guarded by the pinned
        # count in corpus_expected.txt like the rest of the corpus.
        if: github.event_name == 'schedule'
        run: CORPUS_DEEP=1 bash scripts/run_corpus.sh ./build/src/codeskeptic corpus-work

      - name: Summary
        if: always()
        run: |
          {
            echo "## Juliet results"
            echo '```'
            grep "JULIET_RESULT" juliet-output.txt || echo "(no results)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
