name: Juliet benchmark

# Agir kosum (indirme ~120MB + binlerce dosya) — her PR'da degil:
# haftalik + elle tetikleme. Sonuclar log'daki JULIET_RESULT
# satirlarindan izlenir.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "CWE basina dosya limiti (0 = limitsiz)"
        default: "400"
  schedule:
    - cron: "0 5 * * 1"  # pazartesi 05:00 UTC

jobs:
  juliet:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libclang-18-dev libzstd-dev zlib1g-dev \
            clang-18 ninja-build unzip

      - name: Configure and build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-18
          cmake --build build

      - name: Cache Juliet suite
        uses: actions/cache@v4
        with:
          path: juliet-work/juliet
          key: juliet-c-cpp-1.3

      - name: Run benchmark
        run: |
          bash scripts/run_juliet.sh ./build/src/zerodefect juliet-work \
            "${{ github.event.inputs.limit || '400' }}" | tee juliet-output.txt

      - name: Summary
        if: always()
        run: |
          {
            echo "## Juliet sonuçları"
            echo '```'
            grep "JULIET_RESULT" juliet-output.txt || echo "(sonuç yok)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
