name: CI

on:
  push:
    # phase* branches: the dev sandbox drives this repo over the git
    # protocol only (no REST API), so feature work pushed as phase*
    # gets CI on push and reads the verdict from refs/status/* (see
    # the last step) without needing a PR to exist first.
    branches: [main, "phase*"]
  pull_request:

# Job-status mirroring (refs/status/*) needs push rights.
permissions:
  contents: write

# Cost balance: back-to-back pushes to the same ref cancel the old run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 and build tools
        id: install
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-20-dev libclang-20-dev libzstd-dev zlib1g-dev \
            clang-20 ninja-build

      - name: Configure
        id: configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=/usr/lib/llvm-20

      - name: Build
        id: build
        run: cmake --build build

      - name: Test
        id: test
        run: ctest --test-dir build --output-on-failure

      - name: Test (single process)
        id: test-single
        # ctest runs each test in its own process — it cannot see
        # global-state leakage between tests (this is how McpServerTest's
        # filter leak hid 11 interproc tests). The same binary is also
        # run in a single process so contamination becomes visible.
        run: ./build/tests/codeskeptic_tests

      - name: Smoke test
        id: smoke
        run: |
          cat > /tmp/smoke.cpp << 'EOF'
          void leak() {
              int* p = new int(42);
              p = new int(7);
          }
          EOF
          # Exit code must be 1 when there are findings. Actions steps run
          # with `bash -e`: a failing command not caught with || kills the
          # script immediately.
          code=0
          ./build/src/codeskeptic /tmp/smoke.cpp || code=$?
          test "$code" -eq 1

      - name: Self-scan (dogfood gate)
        id: selfscan
        # The analyzer analyzes its own sources — with the founding
        # policy active. Any finding (or a hard-coded absolute path)
        # fails CI: exit 0 means clean.
        run: ./build/src/codeskeptic src/ --build-path build --policy no-absolute-paths

      - name: Real-world corpus (cJSON + tinyxml2)
        id: corpus
        run: bash scripts/run_corpus.sh ./build/src/codeskeptic /tmp/corpus

      - name: Thesis gate (blind AI first-draft corpus)
        id: thesis
        # The mission-axis gate: a frozen corpus of first-draft C
        # written by rule-blind generators. Clean files must stay 0
        # (precision), buggy files must not drop below their pinned
        # floor (recall). tests/thesis_corpus/thesis_expected.txt.
        run: bash scripts/run_thesis.sh ./build/src/codeskeptic

      - name: Failure diagnostics -> refs/ci-logs/*
        # The sandbox cannot read Actions logs (git protocol only). On
        # failure: record per-step outcomes, re-run the failed tests
        # and the self-scan with output captured, and push the lot as
        # a commit under refs/ci-logs/<sha>/build-and-test.
        if: failure()
        env:
          STEPS_JSON: ${{ toJSON(steps) }}
        run: |
          mkdir -p /tmp/diag
          echo "$STEPS_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value.outcome)"' \
            > /tmp/diag/steps.txt 2>/dev/null || echo "$STEPS_JSON" > /tmp/diag/steps.txt
          ctest --test-dir build --rerun-failed --output-on-failure \
            > /tmp/diag/ctest_failed.txt 2>&1 || true
          tail -c 30000 /tmp/diag/ctest_failed.txt > /tmp/diag/ctest_failed_tail.txt || true
          ./build/src/codeskeptic src/ --build-path build --policy no-absolute-paths \
            > /tmp/diag/selfscan.txt 2>&1 || true
          git config user.name "ci-logs"
          git config user.email "ci-logs@localhost"
          git checkout --detach -q
          cp /tmp/diag/steps.txt /tmp/diag/ctest_failed_tail.txt /tmp/diag/selfscan.txt .
          git add -f steps.txt ctest_failed_tail.txt selfscan.txt
          git commit -qm "ci diagnostics @ ${{ github.sha }}"
          git push --force origin "HEAD:refs/ci-logs/${{ github.sha }}/build-and-test"

      - name: Mirror job status to refs/status/*
        # The dev sandbox can reach this repo over the git protocol
        # only (no REST API), so the job's conclusion is published as
        # a lightweight ref it can read with `git ls-remote`:
        #   refs/status/<sha>/build-and-test/<success|failure|cancelled>
        # Namespaced refs are invisible as branches and trigger nothing.
        if: always()
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/build-and-test/${{ job.status }}"
