name: Real-world scan

# On-demand re-validation of the README's real-world scan table on the
# current engine. Triggered by pushing to the `realworld-scan` branch
# (the dev sandbox cannot use workflow_dispatch — git protocol only).
# Each project is built with its own build system at a PINNED version,
# analyzed from its real compilation database with its idiom profile,
# and the resulting counts + reports are published to
# refs/ci-logs/<sha>/realworld for git-protocol readback.
#
# Scope: the projects whose builds fit a CI runner (libgit2,
# rtp2httpd). The heavyweights (systemd, shadPS4, llama.cpp) stay
# documented as hand-run campaigns.
on:
  push:
    branches: ["realworld-scan"]

permissions:
  contents: write

concurrency:
  group: realworld-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev libclang-20-dev clang-20 \
            libzstd-dev zlib1g-dev ninja-build libssl-dev

      - name: Build CodeSkeptic
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-20 \
            -DCODESKEPTIC_BUILD_TESTS=OFF
          cmake --build build

      - name: Scan libgit2 (pinned v1.9.0, idiom profile)
        run: |
          set -o pipefail
          curl -sL --retry 3 \
            https://github.com/libgit2/libgit2/archive/refs/tags/v1.9.0.tar.gz \
            | tar xz
          cd libgit2-1.9.0
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=OFF -DBUILD_CLI=OFF >/dev/null
          cd ..
          code=0
          ./build/src/codeskeptic libgit2-1.9.0/src \
            --build-path libgit2-1.9.0/build \
            --alloc-functions git__malloc,git__calloc,git__realloc,git__strdup \
            --free-functions git__free \
            --report-paths "$PWD/libgit2-1.9.0/src" \
            2>&1 | tee libgit2-scan.log || code=$?
          n=$(grep -cE '\.(c|h):[0-9]+:[0-9]+ \[(warning|error)\]' libgit2-scan.log || true)
          echo "REALWORLD_RESULT project=libgit2 v=1.9.0 findings=$n exit=$code"
          echo "REALWORLD_RESULT project=libgit2 v=1.9.0 findings=$n" >> results.txt

      - name: Scan rtp2httpd (pinned, no profile needed)
        run: |
          set -o pipefail
          git clone --quiet --depth 1 https://github.com/stackia/rtp2httpd
          cd rtp2httpd
          # autotools project; a bear-style DB via compile flags is
          # overkill — the fallback per-extension DB parses plain C99.
          cd ..
          code=0
          ./build/src/codeskeptic rtp2httpd/src \
            --report-paths "$PWD/rtp2httpd/src" \
            2>&1 | tee rtp2httpd-scan.log || code=$?
          n=$(grep -cE '\.(c|h):[0-9]+:[0-9]+ \[(warning|error)\]' rtp2httpd-scan.log || true)
          echo "REALWORLD_RESULT project=rtp2httpd findings=$n exit=$code"
          echo "REALWORLD_RESULT project=rtp2httpd findings=$n" >> results.txt

      - name: Deep corpus (abseil) for good measure
        run: |
          CORPUS_DEEP=1 bash scripts/run_corpus.sh ./build/src/codeskeptic corpus-work \
            2>&1 | tail -20 | tee -a results.txt

      - name: Publish results + logs to refs/ci-logs/*
        if: always()
        run: |
          tail -c 60000 libgit2-scan.log > libgit2.tail.log 2>/dev/null || true
          tail -c 30000 rtp2httpd-scan.log > rtp2httpd.tail.log 2>/dev/null || true
          git config user.name "ci-logs"
          git config user.email "ci-logs@localhost"
          git checkout --detach -q
          git add -f results.txt libgit2.tail.log rtp2httpd.tail.log 2>/dev/null || true
          git commit -qm "realworld scan @ ${{ github.sha }}" || true
          git push --force origin "HEAD:refs/ci-logs/${{ github.sha }}/realworld"

      - name: Mirror job status to refs/status/*
        if: always()
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/realworld/${{ job.status }}"
