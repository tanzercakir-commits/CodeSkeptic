name: Action self-test

# After a successful Release run, the packaged action (action.yml) is
# exercised end to end against this repo's own docs/demo.c: download
# the fresh release binary, analyze, produce SARIF, and verify that
# report-only gating keeps the job green while findings exist.
#
# Trigger is workflow_run, NOT release:published — the release is
# published by the Release workflow's own GITHUB_TOKEN, and
# token-created events never trigger other workflows (recursion
# guard). workflow_run is exempt (proven by docker.yml's publish leg).
# The push trigger on this file itself gives a one-shot validation
# lane against the latest published release.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  push:
    branches: ["phase*"]
    paths: [".github/workflows/action-selftest.yml"]

permissions:
  contents: write
  security-events: write

jobs:
  selftest:
    # workflow_run fires on failed Release runs too — only test what
    # actually published.
    if: github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run the action on docs/demo.c (report-only)
        id: run
        uses: ./
        with:
          path: docs/demo.c
          sarif: selftest.sarif
          upload-sarif: "false"
          gate: report-only
          version: latest

      - name: Verify findings + SARIF
        run: |
          test "${{ steps.run.outputs.exit-code }}" = "1"
          test -s selftest.sarif
          grep -q '"results"' selftest.sarif

      # Pinned-version lane (critique-2): on a Release-triggered run
      # the fresh tag is workflow_run.head_branch — run the action
      # PINNED to it and assert the analyzer that answers is exactly
      # that version (download + checksum + resolution end to end).
      - name: Run the action pinned to the fresh release tag
        if: github.event_name == 'workflow_run'
        id: pinned
        uses: ./
        with:
          path: docs/demo.c
          sarif: pinned.sarif
          upload-sarif: "false"
          gate: report-only
          version: ${{ github.event.workflow_run.head_branch }}

      - name: Verify the pinned analyzer version matches the tag
        if: github.event_name == 'workflow_run'
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          test "${{ steps.pinned.outputs.exit-code }}" = "1"
          codeskeptic --version | grep -F "${TAG#v}"

      - name: Mirror job status to refs/status/*
        if: always()
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/action-selftest/${{ job.status }}"
