name: Windows

# The native-Windows ratchet (docs/windows-support.md §6): MSVC build
# against the official LLVM windows-msvc dev tarball + the full ctest
# suite. Without this floor, the first later change breaks Windows and
# no one notices. No third-party actions (trust-chain rule): the MSVC
# environment comes from vswhere+vcvars64 directly.

on:
  push:
    branches: [main, "phase*"]
  pull_request:

# Job-status mirroring (refs/status/*) needs push rights.
permissions:
  contents: write

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC + LLVM (shared with release.yml)
        uses: ./.github/actions/setup-msvc-llvm

      - name: Configure
        id: configure
        shell: pwsh
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          "-DCMAKE_PREFIX_PATH=C:\llvm\clang+llvm-$env:LLVM_VER-x86_64-pc-windows-msvc"

      - name: Build
        id: build
        shell: pwsh
        # ninja -k 0: keep compiling past the first failing TU, so one
        # CI round surfaces EVERY portability error, not just the first.
        run: cmake --build build -- -k 0

      - name: Test
        id: test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure

      - name: Test (single process)
        id: test-single
        # Same rationale as the Linux lane: ctest per-process isolation
        # hides global-state leakage; the same binary must also stay
        # green in a single process.
        shell: pwsh
        run: .\build\tests\codeskeptic_tests.exe

      - name: Smoke test (native binary, real finding, exit code 1)
        id: smoke
        shell: bash
        run: |
          cat > smoke.cpp << 'EOF'
          void leak() {
              int* p = new int(42);
              p = new int(7);
          }
          EOF
          code=0
          ./build/src/codeskeptic.exe smoke.cpp || code=$?
          test "$code" -eq 1

      - name: Directory mode without a Developer Prompt (Tier 2 guard)
        id: nodev-dirmode
        # Tier 2 ("SDK discovery") closed by measurement, not code:
        # clang's MSVC toolchain locates VS and the Windows SDK by
        # COM/registry on its own. Proven in two probe rounds (the
        # second stripped the ENTIRE 28-variable vcvars family), then
        # promoted to this hard step: plain-terminal simulation, the
        # analyzer must still resolve <stdio.h> in analyzed code and
        # report the planted bug. If this regresses, the lane goes red.
        shell: pwsh
        run: |
          $family = '^(INCLUDE|EXTERNAL_INCLUDE|LIB|LIBPATH|DevEnvDir|VSINSTALLDIR|VCINSTALLDIR|VCIDEInstallDir|VCToolsInstallDir|VCToolsVersion|VCToolsRedistDir|WindowsSdkDir|WindowsSDKVersion|WindowsSdkBinPath|WindowsSdkVerBinPath|WindowsSDKLibVersion|UniversalCRTSdkDir|UCRTVersion|VSCMD_.*|Framework.*|ExtensionSdkDir)$'
          Get-ChildItem Env: | Where-Object { $_.Name -match $family } | ForEach-Object {
            Remove-Item "Env:$($_.Name)" -ErrorAction SilentlyContinue
          }
          New-Item -ItemType Directory -Force -Path probe_dir | Out-Null
          @'
          #include <stdio.h>
          #include <stdlib.h>
          void f(void) {
              int* p = (int*)malloc(4 * sizeof(int));
              p[10] = 1;
          }
          '@ | Set-Content probe_dir\probe.c
          $out = & .\build\src\codeskeptic.exe probe_dir 2>&1 | Out-String
          $code = $LASTEXITCODE
          "exit=$code`n$out" | Set-Content probe_result.txt
          if (-not ($code -eq 1 -and $out -match 'bounds')) {
            Write-Host $out
            throw "no-dev-prompt directory mode regressed (exit=$code)"
          }
          # Explicit success: the pwsh shell wrapper otherwise exits
          # with $LASTEXITCODE — which is the analyzer's 1 (= findings,
          # exactly what we asserted FOR).
          exit 0

      - name: Package rehearsal (release-lane parity, every push)
        id: package
        # The Linux packaging path is exercised on every phase push by
        # the Docker lane; this is the Windows analog — a broken
        # package must surface at push time, not at tag time.
        shell: bash
        run: bash scripts/package_release.sh build/src/codeskeptic.exe dist "/c/llvm/clang+llvm-${LLVM_VER}-x86_64-pc-windows-msvc/bin/clang.exe"

      - name: Package rehearsal (fresh machine — 7-Zip masked, PS fallback)
        id: package-no7z
        # The first external Windows evaluation's MEDIUM: packaging
        # hard-required 7z, which fresh machines don't have. The script
        # now falls back to PowerShell Compress-Archive; this step
        # proves that arm for real — 7-Zip is removed from PATH (the
        # exact fresh-machine condition), packaging must still produce
        # a zip, and the zip must expand with codeskeptic.exe inside.
        # Output goes to dist-no7z so the 7z-built zip in dist (used by
        # the relocation smoke below) stays untouched.
        shell: bash
        run: |
          PATH=$(printf '%s\n' "$PATH" | tr ':' '\n' | grep -vi '7-zip' | paste -sd:)
          export PATH
          if command -v 7z >/dev/null 2>&1; then
            echo "7z still visible after masking — rehearsal invalid"
            exit 1
          fi
          bash scripts/package_release.sh build/src/codeskeptic.exe dist-no7z "/c/llvm/clang+llvm-${LLVM_VER}-x86_64-pc-windows-msvc/bin/clang.exe"
          ZIP=$(ls dist-no7z/codeskeptic-*-windows-*.zip)
          powershell.exe -NoProfile -Command \
            "Expand-Archive -Path '$ZIP' -DestinationPath 'no7z_check' -Force"
          find no7z_check -name codeskeptic.exe | grep -q codeskeptic.exe

      - name: Relocation smoke (package tree only — LLVM hidden, plain terminal)
        id: reloc-smoke
        # The unpacked zip must carry itself: C:\llvm (the baked
        # resource-dir path AND the build LLVM) is renamed away, the
        # vcvars family stripped, and the packaged exe must still
        # analyze docs/demo.c via its exe-relative bundled headers +
        # driver SDK discovery, with the exit-1 findings contract.
        shell: pwsh
        run: |
          $family = '^(INCLUDE|EXTERNAL_INCLUDE|LIB|LIBPATH|DevEnvDir|VSINSTALLDIR|VCINSTALLDIR|VCIDEInstallDir|VCToolsInstallDir|VCToolsVersion|VCToolsRedistDir|WindowsSdkDir|WindowsSDKVersion|WindowsSdkBinPath|WindowsSdkVerBinPath|WindowsSDKLibVersion|UniversalCRTSdkDir|UCRTVersion|VSCMD_.*|Framework.*|ExtensionSdkDir)$'
          Get-ChildItem Env: | Where-Object { $_.Name -match $family } | ForEach-Object {
            Remove-Item "Env:$($_.Name)" -ErrorAction SilentlyContinue
          }
          Rename-Item C:\llvm C:\llvm-hidden
          try {
            $zip = Get-ChildItem dist\codeskeptic-*-windows-*.zip | Select-Object -First 1
            Expand-Archive $zip.FullName -DestinationPath "$env:TEMP\cs_pkg" -Force
            $exe = Get-ChildItem "$env:TEMP\cs_pkg" -Recurse -Filter codeskeptic.exe | Select-Object -First 1
            $out = & $exe.FullName docs\demo.c 2>&1 | Out-String
            $code = $LASTEXITCODE
          } finally {
            Rename-Item C:\llvm-hidden C:\llvm
          }
          Write-Host $out
          if (-not ($code -eq 1 -and $out -match 'finding')) {
            throw "package relocation smoke failed (exit=$code)"
          }
          exit 0

      - name: Failure diagnostics -> refs/ci-logs/*
        # Same contract as ci.yml: the dev sandbox reads Actions results
        # over the git protocol only. Configure/build logs matter most
        # here — MSVC compile errors are this lane's likely failure mode.
        if: failure()
        shell: bash
        env:
          STEPS_JSON: ${{ toJSON(steps) }}
        run: |
          mkdir -p /tmp/diag
          echo "$STEPS_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value.outcome)"' \
            > /tmp/diag/steps.txt 2>/dev/null || echo "$STEPS_JSON" > /tmp/diag/steps.txt
          cmake --build build > /tmp/diag/build_rerun.txt 2>&1 || true
          tail -c 30000 /tmp/diag/build_rerun.txt > /tmp/diag/build_tail.txt || true
          ctest --test-dir build --rerun-failed --output-on-failure \
            > /tmp/diag/ctest_failed.txt 2>&1 || true
          tail -c 30000 /tmp/diag/ctest_failed.txt > /tmp/diag/ctest_failed_tail.txt || true
          tail -c 20000 build/CMakeFiles/CMakeConfigureLog.yaml \
            > /tmp/diag/configure_tail.txt 2>/dev/null || true
          git config user.name "ci-logs"
          git config user.email "ci-logs@localhost"
          git checkout --detach -q
          cp /tmp/diag/steps.txt /tmp/diag/build_tail.txt \
             /tmp/diag/ctest_failed_tail.txt /tmp/diag/configure_tail.txt . 2>/dev/null || true
          git add -f steps.txt build_tail.txt ctest_failed_tail.txt configure_tail.txt
          [ -f probe_result.txt ] && git add -f probe_result.txt || true
          git commit -qm "windows ci diagnostics @ ${{ github.sha }}"
          git push --force origin "HEAD:refs/ci-logs/${{ github.sha }}/windows-native"

      - name: Mirror job status to refs/status/*
        if: always()
        shell: bash
        run: |
          git push --force origin \
            "HEAD:refs/status/${{ github.sha }}/windows-native/${{ job.status }}"
