# systemd idiom profile — deliberately almost empty, and that is the
# point: systemd's idioms (_cleanup_free_/g_autofree cleanup
# attributes, TAKE_PTR/free_and_replace ownership macros, FOREACH_ARRAY
# pointer-relational loops) are recognized natively by the engine —
# each one became an engine feature with a pinned test during the scan
# campaign (414 -> 53). Nothing to declare here; kept as a worked
# example that "no configuration needed" is sometimes the honest
# profile.
