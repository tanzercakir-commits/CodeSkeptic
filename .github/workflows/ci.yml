name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libclang-18-dev libzstd-dev zlib1g-dev \
            clang-18 ninja-build

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=/usr/lib/llvm-18

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Smoke test
        run: |
          cat > /tmp/smoke.cpp << 'EOF'
          void leak() {
              int* p = new int(42);
              p = new int(7);
          }
          EOF
          # Bulgu varken exit code 1 olmali. Actions adimlari `bash -e` ile
          # kosar: basarisiz komut || ile yakalanmazsa script aninda olur.
          code=0
          ./build/src/zerodefect /tmp/smoke.cpp || code=$?
          test "$code" -eq 1

      - name: Real-world corpus (cJSON + tinyxml2)
        run: bash scripts/run_corpus.sh ./build/src/zerodefect /tmp/corpus
