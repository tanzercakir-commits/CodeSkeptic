# ReactOS idiom profile — the kernel/RTL allocation families. ReactOS
# is a from-scratch Windows-NT-compatible OS; its C code allocates
# through the NT pool and RTL heap APIs, not malloc. Without these the
# leak/double-free/UAF dataflow never sees an allocation.
#
#   Ex*Pool*         — kernel-mode pool (ntoskrnl, drivers, win32ss)
#   RtlAllocateHeap  — user-mode + RTL heap (sdk/lib/rtl, ntdll)
#   Rtl*Memory / *Free* pairings kept symmetric so a freed block is a
#   freed block whichever half of the codebase allocated it.
alloc_functions = ExAllocatePool,ExAllocatePoolWithTag,ExAllocatePoolZero,ExAllocatePoolWithTagPriority,RtlAllocateHeap,RtlReAllocateHeap,ExAllocatePoolWithQuotaTag
free_functions = ExFreePool,ExFreePoolWithTag,RtlFreeHeap
