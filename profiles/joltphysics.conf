# JoltPhysics idiom profile — custom (aligned) allocator family, plus
# Jolt's intrusive owning smart pointers: a raw pointer adopted by
# Ref<T>/RefConst<T> is owned, not leaked (31 leak findings -> 8 in the
# scan when declared).
alloc_functions = Allocate,AlignedAllocate,Reallocate
free_functions = Free,AlignedFree
owning_pointers = Ref,RefConst
